pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        file("local.properties").withInputStream { properties.load(it) }
        def flutterSdkPath = properties.getProperty("flutter.sdk")
        assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
        return flutterSdkPath
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        maven { url 'https://mirrors.tuna.tsinghua.edu.cn/gradle-plugin-portal/' }
        maven { url 'https://mirrors.tuna.tsinghua.edu.cn/repository/google/' }
        maven { url 'https://mirrors.tuna.tsinghua.edu.cn/maven2/' }
        maven { url 'https://storage.flutter-io.cn/download.flutter.io/' }
        gradlePluginPortal()
        google()
        mavenCentral()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.9.1" apply false
    id "org.jetbrains.kotlin.android" version "2.0.0" apply false
}

dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS)
    repositories {
        maven { url 'https://mirrors.tuna.tsinghua.edu.cn/repository/google/' }
        maven { url 'https://mirrors.tuna.tsinghua.edu.cn/maven2/' }
        maven { url 'https://mirrors.tuna.tsinghua.edu.cn/jcenter/' }
        maven { url 'https://storage.flutter-io.cn/download.flutter.io/' }
        google()
        mavenCentral()
    }
}

include ":app"
