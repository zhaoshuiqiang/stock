name: stock_analyzer
description: 增强型股票分析系统 - Android客户端
version: 2.27.0
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  fl_chart: ^0.68.0
  intl: ^0.19.0
  shared_preferences: ^2.2.0
  flutter_local_notifications: ^17.0.0
  sqflite: ^2.3.0
  path_provider: ^2.1.0
  charset_converter: ^2.0.1
  url_launcher: ^6.2.0
  webview_flutter: ^4.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#C4161C"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"

flutter:
  uses-material-design: true
  assets:
    - assets/concept_tags.json